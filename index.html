<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salina Kurtha Collection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f8f8f8;
        }
        header {
            background-color: #ff6f61;
            color: white;
            text-align: center;
            padding: 20px;
        }
        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        .product {
            background: white;
            padding: 15px;
            margin: 15px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 250px;
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
        .btn {
            background-color: #ff6f61;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Salina Kurtha Collection</h1>
    <p>Stylish & Affordable Trending Kurthas</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Our Trending Kurthas</h2>

    <div class="product">
        <img src="https://via.placeholder.com/250x300" alt="Kurtha 1">
        <h3>Elegant Red Kurtha</h3>
        <p>Price: Rs. 1200</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x300" alt="Kurtha 2">
        <h3>Stylish Blue Kurtha</h3>
        <p>Price: Rs. 1100</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x300" alt="Kurtha 3">
        <h3>Modern Yellow Kurtha</h3>
        <p>Price: Rs. 1000</p>
        <button class="btn">Buy Now</button>
    </div>
</div>

<footer>
    <p>Owner: Salina Shrestha</p>
    <p>Contact: 9837848399</p>
</footer>

</body>
</html>
